name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject config into index.html
        env:
          CP_URL:      ${{ vars.CONTROL_PLANE_URL }}
          CP_USERNAME: ${{ vars.FACETS_USERNAME }}
          CP_TOKEN:    ${{ secrets.FACETS_TOKEN }}
        run: |
          sed -i \
            -e "s|__CP_URL__|${CP_URL}|g" \
            -e "s|__CP_USERNAME__|${CP_USERNAME}|g" \
            -e "s|__CP_TOKEN__|${CP_TOKEN}|g" \
            index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
